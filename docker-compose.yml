version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: log_analyzer_pg
    environment:
      POSTGRES_DB: log_analyzer
      POSTGRES_USER: analyzer
      POSTGRES_PASSWORD: analyzer_secret
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyzer -d log_analyzer"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: log_analyzer_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:

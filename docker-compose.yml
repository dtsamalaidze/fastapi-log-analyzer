services:
  postgres:
    image: postgres:15
    container_name: log_analyzer_pg
    environment:
      POSTGRES_DB: log_analyzer
      POSTGRES_USER: analyzer
      POSTGRES_PASSWORD: analyzer_secret
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyzer -d log_analyzer"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: log_analyzer_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    container_name: log_analyzer_app
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+psycopg2://analyzer:analyzer_secret@postgres:5432/log_analyzer
      HOST: 0.0.0.0
      PORT: "8001"
      SESSION_SECRET: "${SESSION_SECRET}"
      S3_ENDPOINT: "${S3_ENDPOINT:-}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:-}"
      S3_SECRET_KEY: "${S3_SECRET_KEY:-}"
      S3_BUCKET: "${S3_BUCKET:-}"
      S3_PREFIX: "${S3_PREFIX:-logs}"
      S3_SYNC_INTERVAL: "${S3_SYNC_INTERVAL:-3600}"
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
